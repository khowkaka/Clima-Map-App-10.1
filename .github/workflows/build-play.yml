name: Build Google Play AAB APK

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify uploaded Android icon pack
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          cp app/src/main/res/drawable/app_logo.png app/src/main/res/mipmap-mdpi/ic_launcher.png || true
          cp app/src/main/res/drawable/app_logo.png app/src/main/res/mipmap-hdpi/ic_launcher.png || true
          cp app/src/main/res/drawable/app_logo.png app/src/main/res/mipmap-xhdpi/ic_launcher.png || true
          cp app/src/main/res/drawable/app_logo.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png || true
          cp app/src/main/res/drawable/app_logo.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<EOF
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@android:color/transparent"/>
    <foreground android:drawable="@drawable/app_logo"/>
</adaptive-icon>
EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml <<EOF
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@android:color/transparent"/>
    <foreground android:drawable="@drawable/app_logo"/>
</adaptive-icon>
EOF

          ls -R app/src/main/res
          test -f app/src/main/res/mipmap-hdpi/ic_launcher.png
          test -f app/src/main/res/mipmap-xhdpi/ic_launcher.png
          test -f app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          test -f app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          test -f app/src/main/res/drawable/ic_launcher_foreground.png
          test -f app/src/main/res/drawable/ic_launcher_background.png
          test -f app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
      - name: Restore signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-keystore.p12
      - name: Build signed APK and AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_TYPE: ${{ secrets.STORE_TYPE }}
        run: gradle assembleRelease bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: google-play-build
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
